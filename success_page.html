<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出金成功 - 维尔利金融</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 成功卡片 */
        .success-card {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.09);
            text-align: center;
            margin-top: 50px;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background-color: #52c41a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 48px;
            color: white;
        }
        
        .success-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        
        .success-desc {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }
        
        /* 出金详情 */
        .withdrawal-details {
            background-color: #fafafa;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 30px;
            text-align: left;
        }
        
        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .detail-label {
            font-size: 14px;
            color: #666;
        }
        
        .detail-value {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }
        
        /* 按钮 */
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .primary-btn {
            background-color: #1890ff;
            color: white;
            border: none;
        }
        
        .primary-btn:hover {
            background-color: #40a9ff;
        }
        
        .secondary-btn {
            background-color: white;
            color: #1890ff;
            border: 1px solid #1890ff;
        }
        
        .secondary-btn:hover {
            background-color: rgba(24, 144, 255, 0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 成功卡片 -->
        <div class="success-card">
            <div class="success-icon">✓</div>
            <div class="success-title">出金申请已提交成功</div>
            <div class="success-desc">您的资金将在24小时内转入您提供的欧易地址，请耐心等待。</div>
            
            <!-- 出金详情 -->
            <div class="withdrawal-details">
                <div class="detail-item">
                    <span class="detail-label">出金金额</span>
                    <span class="detail-value">¥50,000.00</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">收款地址</span>
                    <span class="detail-value" style="font-family: monospace;">0x8a9...c7d2</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">交易单号</span>
                    <span class="detail-value">WT2026030600888</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">提交时间</span>
                    <span class="detail-value">2026-03-06 14:46:32</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">预计到账时间</span>
                    <span class="detail-value">2026-03-07 14:46:32</span>
                </div>
            </div>
            
            <!-- 按钮组 -->
            <div class="btn-group">
                <button class="btn primary-btn" onclick="window.location.href='withdrawal_page.html'">返回首页</button>
                <button class="btn secondary-btn" onclick="window.location.href='withdrawal_page.html'">查看账户</button>
            </div>
        </div>
    </div>
</body>
</html>
