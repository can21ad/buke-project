<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #ffffff;
            font-size: 24px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            background: rgba(102, 126, 234, 0.5);
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .loading::after {
            content: '';
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        pre {
            white-space: pre-wrap;
            word-break: break-all;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .success {
            color: #4caf50;
        }
        
        .error {
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>API测试</h1>
        
        <button class="btn" id="testBtn">测试API</button>
        
        <div id="loading" class="loading" style="display: none;"></div>
        
        <div id="result" class="result" style="display: none;">
            <h2>测试结果</h2>
            <pre id="resultContent"></pre>
        </div>
    </div>
    
    <script>
        document.getElementById('testBtn').addEventListener('click', async function() {
            const testBtn = document.getElementById('testBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');
            
            // 显示加载状态
            testBtn.disabled = true;
            testBtn.textContent = '测试中...';
            loading.style.display = 'flex';
            result.style.display = 'none';
            
            try {
                // 测试API调用
                const response = await fetch('https://openrouter.fans/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer sk-S6Q7NxPxQUNY7gWP1RRC3cTeRuJ2mjPY42CRS3WShl5KrSE3'
                    },
                    body: JSON.stringify({
                        model: 'ds/chat',
                        messages: [
                            {
                                role: 'user',
                                content: '你好，测试API连接'
                            }
                        ],
                        temperature: 0.7
                    })
                });
                
                // 获取响应数据
                const data = await response.json();
                
                // 隐藏加载状态
                loading.style.display = 'none';
                testBtn.disabled = false;
                testBtn.textContent = '测试API';
                
                // 显示结果
                result.style.display = 'block';
                resultContent.innerHTML = `<div class="success">API调用成功！</div>\n状态码: ${response.status}\n\n响应数据:\n${JSON.stringify(data, null, 2)}`;
                
            } catch (error) {
                // 隐藏加载状态
                loading.style.display = 'none';
                testBtn.disabled = false;
                testBtn.textContent = '测试API';
                
                // 显示错误信息
                result.style.display = 'block';
                resultContent.innerHTML = `<div class="error">API调用失败！</div>\n错误信息: ${error.message}`;
            }
        });
    </script>
</body>
</html>
